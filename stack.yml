version: '3.8'

services:
  dbproductividad:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - productivity-net
    deploy:
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - productivity-net
    deploy:
      restart_policy:
        condition: on-failure

  web:
    image: ghcr.io/byronmoreno/productividad:latest
    environment:
      - FLASK_ENV=${FLASK_ENV}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@dbproductividad:${POSTGRES_PORT}/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - uploads_data:/app/app/static/uploads
    networks:
      - productivity-net
      - traefik-public
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.kanban.entrypoints=http"
        - "traefik.http.routers.kanban.rule=Host(`kanban.byronrm.com`)"
        - "traefik.http.middlewares.kanban-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.kanban.middlewares=portainer-https-redirect"
        - "traefik.http.routers.kanban-secure.entrypoints=https"
        - "traefik.http.routers.kanban-secure.rule=Host(`kanban.byronrm.com`)"
        - "traefik.http.routers.kanban-secure.tls=true"
        - "traefik.http.routers.kanban-secure.tls.certresolver=http"
        - "traefik.http.routers.kanban-secure.service=kanban"
        - "traefik.http.services.kanban.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"

  celery_worker:
    image: ghcr.io/byronmoreno/productividad:latest
    command: celery -A app.core.tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@dbproductividad:${POSTGRES_PORT}/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - uploads_data:/app/app/static/uploads
    networks:
      - productivity-net
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  pgdata:
  uploads_data:

networks:
  productivity-net:
    driver: overlay
  traefik-public:
    external: true
