<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity OS</title>
    <!-- Script de bloqueo rápido para tema persistente (sin parpadeo) -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        })();
    </script>
    <!-- Bootstrap 5 Bundle CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}?v=8">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('core.index') }}">
                <i data-lucide="feather" class="me-2 text-primary"></i>Antigravity OS
            </a>
            <div class="d-flex align-items-center order-lg-last">
                <!-- Theme Toggle Button -->
                <button class="theme-toggle-btn me-2" id="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
                    <i data-lucide="sun" id="theme-icon-light" style="display: none;"></i>
                    <i data-lucide="moon" id="theme-icon-dark"></i>
                </button>
                <button class="navbar-toggler border-0 text-dark bg-transparent p-0 ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <i data-lucide="menu"></i>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('core.index') }}">
                            <i data-lucide="home" class="me-1"></i>Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('tasks.index') }}">
                            <i data-lucide="kanban" class="me-1"></i>Kanban
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('calendar.index') }}">
                            <i data-lucide="calendar" class="me-1"></i>Time Blocking
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('knowledge.index') }}">
                            <i data-lucide="book-open" class="me-1"></i>Segundo Cerebro
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('analytics.index') }}">
                            <i data-lucide="bar-chart-3" class="me-1"></i>Analíticas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('projects.index') }}">
                            <i data-lucide="folder" class="me-1"></i>Proyectos
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Inicializar iconos
        lucide.createIcons();

        // Re-inicializar iconos tras llamadas HTMX
        document.body.addEventListener('htmx:afterOnLoad', function() {
            lucide.createIcons();
        });

        // Limpiar modales y backdrops de Bootstrap antes del swap de HTMX
        document.body.addEventListener('htmx:beforeSwap', function(evt) {
            const activeModals = document.querySelectorAll('.modal.show');
            activeModals.forEach(modalEl => {
                const modalInstance = bootstrap.Modal.getInstance(modalEl);
                if (modalInstance) {
                    modalInstance.hide();
                }
            });
            document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
            document.body.classList.remove('modal-open');
            document.body.style.overflow = '';
            document.body.style.paddingRight = '';
        });


        // Lógica de Theme Toggle
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                updateThemeToggleUI('light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                updateThemeToggleUI('dark');
            }
        }

        function updateThemeToggleUI(theme) {
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');
            if (theme === 'dark') {
                lightIcon.style.display = 'inline-block';
                darkIcon.style.display = 'none';
            } else {
                lightIcon.style.display = 'none';
                darkIcon.style.display = 'inline-block';
            }
        }

        // Configuración inicial de UI del botón
        (function() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            updateThemeToggleUI(currentTheme);
        })();
    </script>
</body>
</html>
