{% if nodes %}
    <div class="row g-3">
        {% for node in nodes %}
            <div class="col-md-6 col-lg-4">
                <div class="zen-card h-100 d-flex flex-column justify-content-between position-relative">
                    <div>
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h3 class="h5 fw-bold text-dark mb-0 text-truncate" style="max-width: 80%;">{{ node.title }}</h3>
                            <button class="btn btn-sm text-danger p-0 border-0 bg-transparent" 
                                    hx-delete="{{ url_for('knowledge.delete', node_id=node.id) }}"
                                    hx-target="#knowledge-list"
                                    hx-swap="innerHTML"
                                    hx-confirm="¿Seguro que deseas eliminar esta nota de conocimiento?">
                                <i data-lucide="trash" style="width: 14px; height: 14px;"></i>
                            </button>
                        </div>
                        
                        <p class="text-zen-muted small mb-3" style="font-size: 0.85rem; max-height: 60px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;">
                            {{ node.content or 'Sin contenido.' }}
                        </p>
                    </div>

                    <div class="mt-3 pt-3 border-top border-light">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                {% if node.tasks %}
                                    <span class="badge bg-light text-dark border border-secondary" style="font-size: 0.7rem;" title="Tareas asociadas">
                                        <i data-lucide="link" class="me-1 text-primary" style="width: 12px; height: 12px;"></i>{{ node.tasks|length }} tarea(s)
                                    </span>
                                {% else %}
                                    <span class="badge bg-light text-muted border border-secondary" style="font-size: 0.7rem;">Sin enlaces</span>
                                {% endif %}
                            </div>
                            <a href="{{ url_for('knowledge.edit', node_id=node.id) }}" class="btn btn-xs btn-outline-secondary py-1 px-2" style="font-size: 0.75rem;">
                                <i data-lucide="edit" class="me-1" style="width: 12px; height: 12px;"></i>Editar
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% else %}
    <p class="text-zen-muted text-center py-5">No se encontraron notas en tu base de conocimientos.</p>
{% endif %}
