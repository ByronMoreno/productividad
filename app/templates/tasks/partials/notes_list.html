{% if task.notes %}
    <div class="list-group list-group-flush overflow-auto mb-3" style="max-height: 200px; border: 1px solid var(--border); border-radius: 6px; background-color: var(--surface-hover);">
        {% for note in task.notes %}
            <div class="list-group-item bg-transparent text-dark border-bottom p-2" style="font-size: 0.8rem; color: var(--text) !important;">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="text-primary fw-bold" style="font-size: 0.7rem;">
                        <i data-lucide="user" class="me-1" style="width: 10px; height: 10px; vertical-align: middle;"></i>Anotación
                    </span>
                    <span class="text-muted" style="font-size: 0.65rem;">
                        {{ note.created_at_local.strftime('%d/%m/%Y %H:%M') }}
                    </span>
                </div>
                <div class="text-wrap text-break" style="white-space: pre-wrap; line-height: 1.3;">{{ note.content }}</div>
            </div>
        {% endfor %}
    </div>
{% else %}
    <p class="text-zen-muted small text-center py-3">Sin anotaciones de seguimiento aún. Agrega una abajo.</p>
{% endif %}
