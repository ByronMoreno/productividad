{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="display-6 fw-bold mb-0">Kanban Inteligente</h1>
        <p class="text-zen-muted small mb-0">Visualiza y gestiona el flujo de tus actividades.</p>
    </div>
    <button class="btn btn-zen" data-bs-toggle="modal" data-bs-target="#createTaskModal">
        <i data-lucide="plus" class="me-2"></i>Nueva Tarea
    </button>
</div>

<div id="kanban-board" class="mt-4">
    {% include "tasks/partials/kanban.html" %}
</div>

<!-- Modal para Crear Tarea -->
<div class="modal fade" id="createTaskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Nueva Tarea</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form action="{{ url_for('tasks.add') }}" method="POST">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Título</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Proyecto / Área</label>
                        <select class="form-select" name="project_id">
                            <option value="">Ninguno</option>
                            {% for project in projects %}
                                <option value="{{ project.id }}">{{ project.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Estado Inicial</label>
                        <select class="form-select" name="status">
                            <option value="PENDING" selected>Pendiente</option>
                            <option value="TODAY">Para Hoy</option>
                            <option value="PROGRESS">En Proceso</option>
                            <option value="WAITING">Esperando</option>
                            <option value="DONE">Completado</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Energía Requerida (1-5)</label>
                            <select class="form-select" name="energy">
                                <option value="1">★ (Muy Baja)</option>
                                <option value="2">★★</option>
                                <option value="3" selected>★★★</option>
                                <option value="4">★★★★</option>
                                <option value="5">★★★★★ (Muy Alta)</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Prioridad</label>
                            <select class="form-select" name="priority">
                                <option value="LOW">Baja</option>
                                <option value="MEDIUM" selected>Media</option>
                                <option value="HIGH">Alta</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Tiempo Estimado (mins)</label>
                            <input type="number" class="form-control" name="estimated_time" value="30" min="5">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Fecha Límite</label>
                            <input type="date" class="form-control" name="due_date">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-zen">Crear</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function allowDrop(ev) {
        ev.preventDefault();
        const col = ev.target.closest('.kanban-col');
        if (col) {
            col.style.background = 'var(--surface-hover)';
            col.style.borderStyle = 'dashed';
            col.style.borderColor = 'var(--primary)';
        }
    }

    document.addEventListener('dragleave', function(ev) {
        const col = ev.target.closest('.kanban-col');
        if (col && !col.contains(ev.relatedTarget)) {
            col.style.background = '';
            col.style.borderStyle = '';
            col.style.borderColor = '';
        }
    });

    function drag(ev) {
        ev.dataTransfer.setData("text/plain", ev.target.id);
        ev.target.style.opacity = '0.4';
    }

    document.addEventListener('dragend', function(ev) {
        if (ev.target.classList.contains('kanban-task')) {
            ev.target.style.opacity = '1';
        }
        document.querySelectorAll('.kanban-col').forEach(col => {
            col.style.background = '';
            col.style.borderStyle = '';
            col.style.borderColor = '';
        });
    });

    function drop(ev, status) {
        ev.preventDefault();
        document.querySelectorAll('.kanban-col').forEach(col => {
            col.style.background = '';
            col.style.borderStyle = '';
            col.style.borderColor = '';
        });

        const data = ev.dataTransfer.getData("text/plain");
        const taskElement = document.getElementById(data);
        if (!taskElement) return;

        const taskId = data.replace("task-", "");

        htmx.ajax('POST', `/tasks/update-status/${taskId}?status=${status}`, {
            target: '#kanban-board',
            swap: 'innerHTML'
        });
    }

    /* --- INTERACTIVIDAD KANBAN: RESIZE Y COLLAPSE --- */

    let currentResizer = null;
    let startX, startWidth, resizingCol = null;

    function initResize(e, columnId) {
        e.preventDefault();
        const col = document.getElementById(columnId);
        if (!col) return;

        resizingCol = col;
        startX = e.clientX;
        startWidth = parseInt(document.defaultView.getComputedStyle(col).width, 10);

        document.documentElement.addEventListener('mousemove', doResize, false);
        document.documentElement.addEventListener('mouseup', stopResize, false);
        col.querySelector('.kanban-resizer').classList.add('resizing');
    }

    function doResize(e) {
        if (!resizingCol) return;
        const width = startWidth + (e.clientX - startX);
        if (width >= 200 && width <= 600) { // Límites de ancho
            resizingCol.style.width = width + 'px';
            // Guardar en localStorage
            const colId = resizingCol.id.replace('col-', '');
            localStorage.setItem(`kanban-col-width-${colId}`, width + 'px');
        }
    }

    function stopResize(e) {
        if (resizingCol) {
            resizingCol.querySelector('.kanban-resizer').classList.remove('resizing');
        }
        document.documentElement.removeEventListener('mousemove', doResize, false);
        document.documentElement.removeEventListener('mouseup', stopResize, false);
        resizingCol = null;
    }

    function toggleCollapseColumn(status) {
        if (status === 'PROGRESS') return; // En proceso no se puede colapsar

        const col = document.getElementById(`col-${status}`);
        if (!col) return;

        const isCollapsed = col.classList.toggle('collapsed');
        localStorage.setItem(`kanban-col-collapsed-${status}`, isCollapsed ? 'true' : 'false');
    }

    function applyStoredColumnStates() {
        const statuses = ['PENDING', 'TODAY', 'PROGRESS', 'WAITING', 'DONE'];
        
        statuses.forEach(status => {
            const col = document.getElementById(`col-${status}`);
            if (!col) return;

            // Aplicar ancho guardado
            const storedWidth = localStorage.getItem(`kanban-col-width-${status}`);
            if (storedWidth) {
                col.style.width = storedWidth;
            }

            // Aplicar colapso guardado
            if (status !== 'PROGRESS') {
                const storedCollapsed = localStorage.getItem(`kanban-col-collapsed-${status}`);
                if (storedCollapsed === 'true') {
                    col.classList.add('collapsed');
                } else if (storedCollapsed === 'false') {
                    col.classList.remove('collapsed');
                }
            }
        });
    }

    // Inicializar al cargar la página
    document.addEventListener('DOMContentLoaded', () => {
        applyStoredColumnStates();
    });

    // Hidratar tras swaps de HTMX
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        lucide.createIcons();
        applyStoredColumnStates();
    });
</script>
{% endblock %}
