services:
  db:
    image: postgres:17-alpine
    container_name: antigravity_db
    restart: always
    environment:
      POSTGRES_USER: antigravity
      POSTGRES_PASSWORD: antigravity_password
      POSTGRES_DB: antigravity_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: antigravity_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    container_name: antigravity_web
    restart: always
    command: python run.py
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://antigravity:antigravity_password@db:5432/antigravity_os
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkeyantigravityos
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    container_name: antigravity_celery
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://antigravity:antigravity_password@db:5432/antigravity_os
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkeyantigravityos
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
